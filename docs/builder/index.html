<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rally Builder</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon.png">

  <!-- modern-normalize: -->
  <style>*,::after,::before{box-sizing:border-box}html{font-family:system-ui,'Segoe UI',Roboto,Helvetica,Arial,sans-serif,'Apple Color Emoji','Segoe UI Emoji';line-height:1.15;-webkit-text-size-adjust:100%;tab-size:4}body{margin:0}b,strong{font-weight:bolder}code,kbd,pre,samp{font-family:ui-monospace,SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-size:1em}small{font-size:80%}sub,sup{font-size:75%;line-height:0;position:relative;vertical-align:baseline}sub{bottom:-.25em}sup{top:-.5em}table{border-color:currentcolor}button,input,optgroup,select,textarea{font-family:inherit;font-size:100%;line-height:1.15;margin:0}[type=button],[type=reset],[type=submit],button{-webkit-appearance:button}legend{padding:0}progress{vertical-align:baseline}::-webkit-inner-spin-button,::-webkit-outer-spin-button{height:auto}[type=search]{-webkit-appearance:textfield;outline-offset:-2px}::-webkit-search-decoration{-webkit-appearance:none}::-webkit-file-upload-button{-webkit-appearance:button;font:inherit}summary{display:list-item}</style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.1/dist/css/leaflet.extra-markers.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet-extra-markers@1.2.1/dist/js/leaflet.extra-markers.min.js"></script>

  <style>
    * {
      border: none;
      padding: 0;
      margin: 0;
    }

    :root { /* Light mode colors */
      --bg-color: white;
      --fg-color: black;
    }

    @media (prefers-color-scheme: dark) {
      :root { /* Dark mode */
        --bg-color: black;
        --fg-color: white;
      }
    }

    body {
      background-color: var(--bg-color);
      color: var(--fg-color);
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      flex-direction: column;
    }
    #abovemap {
      flex: 1;
      padding: 0.5rem;
      overflow-y: auto; /* Enables vertical scrolling */
      min-height: 0; /* The "Magic" fix: allows the item to be smaller than its content */
    }
    #map {
      flex: 1;
    }
    table {
      border-collapse: collapse;
    }
    table td, table th {
      padding: 0.5rem;
      border: 1px solid #88888888;
    }
    .small-square {
      width: 2rem;
      height: 2rem;
      background-color: #0dd;
      color: black;
      border-radius: 0.3rem;
      text-align: center;
    }
    .small-square:hover {
      background-color: #0ff;
    }
    .small-square:active {
      opacity: 0.5;
    }
    .not-square {
      width: fit-content !important;
      padding: 0 1rem;
    }
    td.nowrap {
      white-space: nowrap;
    }
    button + button {
      margin-left: 0.5rem;
    }
    td a {
      color: var(--fg-color);
      text-decoration: none;
    }
    td a:hover {
      text-decoration: underline;
    }
    td a:active {
      opacity: 0.5;
    }
    .click-to-add {
      margin: 1rem 0;
    }
  </style>
</head>

<body>
  <div id="abovemap">
    <div id="places-table"></div>
    <p class="click-to-add"">Click on the map to add a waypoint.</p>
    <button class="small-square not-square" onclick="publish()">Publish</button>
  </div>
  <div id="map"></div>
</body>

<script>
function load() {
  const str = localStorage.getItem('data');
  if (str) {
    return JSON.parse(str);
  } else {
    return {
      places: [],
    }
  }
}
const data = load();

function round6(x) {
  return Math.round((x + Number.EPSILON) * 1e6) / 1e6;
}

// 2. Add OpenStreetMap tiles
// Satellite plus labels:
const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '&copy; Esri',
  maxZoom: 18, // As good as ArcGIS has.
});//.addTo(map);
// Labels over esri:
// L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
//     pane: 'markerPane', // This ensures labels sit ABOVE the map but BELOW popups
//     pointerEvents: 'none' // Ensures clicks go THROUGH the labels to the map
// }).addTo(map);

// Retina (but requires api key):
// const streets = L.tileLayer('https://tiles.stadiamaps.com/tiles/outdoors/{z}/{x}/{y}{r}.png', {
//     maxZoom: 20,
//     attribution: '© Stadia Maps, © OpenMapTiles © OpenStreetMap contributors',
// });
// Vanilla:
const streets = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 18, // Match ArcGIS.
});

// Initialize the map:
let initialLat = -33.857130;
let initialLng = 151.214830;
let initialZoom = 16;
const mzcs = localStorage.getItem('mapZoomCenter');
if (mzcs) {
  const mzc = JSON.parse(mzcs);
  if (mzc.zoom && mzc.center && mzc.center.lat && mzc.center.lng) {
    initialLat = mzc.center.lat;
    initialLng = mzc.center.lng;
    initialZoom = mzc.zoom;
  }
}
const map = L.map('map', {
  center: [initialLat, initialLng],
  zoom: initialZoom,
  layers: [streets],
});
const baseMaps = {
    "Streets": streets,
    "Satellite": satellite,
};
L.control.layers(baseMaps).addTo(map);
const markerGroup = L.layerGroup().addTo(map);
map.on('click', function(e) {
    data.places.push({
      lat: round6(e.latlng.lat),
      lng: round6(e.latlng.lng),
      name: 'Some place',
      nearby: 'Place is near!',
      clue1: 'Some cryptic clue...',
      clue2: 'Easy clue...',
    });
    update();
    save();
});

// Remember last map location:
function saveZoomAndCenter() {
  const currentZoom = map.getZoom();
  const currentCenter = map.getCenter();
  localStorage.setItem('mapZoomCenter', JSON.stringify({
      zoom: currentZoom,
      center: currentCenter
  }));
}
map.on('moveend', saveZoomAndCenter);
map.on('zoomend', saveZoomAndCenter);

// Update the UI:
function updateTable() {
  const div = document.getElementById('places-table');
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headtr = document.createElement('tr');
  function appendTh(textContent) {
    const th = document.createElement('th');
    th.textContent = textContent;
    headtr.appendChild(th);
  }
  appendTh('#');
  appendTh('Name');
  appendTh('Clue 1');
  appendTh('Clue 2');
  appendTh('Nearby');
  appendTh('Actions');
  thead.appendChild(headtr);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  let placeIndex = 0;
  for (const place of data.places) {
    const thisIndex = placeIndex;
    const tr = document.createElement('tr');
    function appendTd(textContent) {
      const td = document.createElement('td');
      td.textContent = textContent;
      tr.appendChild(td);
    }
    function appendEditableTd(index, field) {
      const td = document.createElement('td');
      const a = document.createElement('a');
      a.href='#';
      a.textContent = place[field];
      a.onclick = () => { onEdit(index, field); return false };
      td.appendChild(a);
      tr.appendChild(td);
    }
    appendTd(placeIndex + 1);
    appendEditableTd(thisIndex, 'name');
    appendEditableTd(thisIndex, 'clue1');
    appendEditableTd(thisIndex, 'clue2');
    appendEditableTd(thisIndex, 'nearby');
    const td = document.createElement('td');
    td.classList.add('nowrap');
    function appendButton(innerHTML, title, click) {
      const b = document.createElement('button');
      b.classList.add('small-square');
      b.title = title;
      b.innerHTML = innerHTML;
      b.onclick = click;
      td.appendChild(b);
    }
    appendButton('&uarr;', 'Up', () => { onMoveUp(thisIndex) });
    appendButton('&darr;', 'Down', () => { onMoveDown(thisIndex) });
    appendButton('&#x2715;', 'Delete', () => { onDelete(thisIndex) });
    appendButton('&#x1F441;', 'Map', () => { onView(thisIndex) });
    tr.appendChild(td);
    tbody.appendChild(tr)
    placeIndex += 1;
  }
  table.appendChild(tbody);
  div.replaceChildren(table);
}
function updateMap() {
  markerGroup.clearLayers();
  let placeIndex = 0;
  for (const place of data.places) {
    const indexCopy = placeIndex;
    const number = indexCopy + 1;
    const myIcon = L.ExtraMarkers.icon({
        icon: 'fa-number',
        number: number.toString(),
        markerColor: 'cyan',
        shape: 'star',
        prefix: 'fa'
    });
    marker = L.marker([place.lat, place.lng], {
      title: place.name,
      icon: myIcon,
      draggable: true,
      autoPan: true, // Move the map if you drag to edge.
    }).addTo(markerGroup);
    marker.on('dragend', function(event) {
      const pos = event.target.getLatLng();
      data.places[indexCopy].lat = round6(pos.lat);
      data.places[indexCopy].lng = round6(pos.lng);
      save();
    });
    placeIndex += 1;
  }
}
function update() {
  updateTable();
  updateMap();
}
update();

function onMoveUp(index) {
  if (index > 0) {
    const temp = data.places[index-1];
    data.places[index-1] = data.places[index];
    data.places[index] = temp;
  }
  update();
  save();
}
function onMoveDown(index) {
  if (index < data.places.length-1) {
    const temp = data.places[index+1];
    data.places[index+1] = data.places[index];
    data.places[index] = temp;
  }
  update();
  save();
}
function onEdit(index, field) {  
  let text = prompt(`Edit ${field}:`, data.places[index][field]);
  if (text) {
    data.places[index][field] = text.trim();
    update();
    save();
  }
}
function onDelete(index) {
  const confirm = window.confirm(`Are you sure you want to delete ${data.places[index].name}?`);
  if (confirm) {
    data.places.splice(index, 1);
  }
  update();
  save();
}
function onView(index) {
  let place = data.places[index];
  map.panTo(new L.LatLng(place.lat, place.lng));
}
function save() {
  localStorage.setItem('data', JSON.stringify(data));
}
async function publish() {
  if (data.places.length == 0) {
    alert('Click on the map to add some places first!');
    return;
  }
  const encoder = new TextEncoder();
  const dataStr = JSON.stringify(data);
  const dataU8Arr = encoder.encode(dataStr);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const pwHash = await crypto.subtle.digest('SHA-256', encoder.encode('rally'));
  const key = await crypto.subtle.importKey('raw', pwHash, 'AES-GCM', false, ['encrypt']);
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, dataU8Arr);
  const ivb64 = await urlsafeBase64(iv);
  const ctb64 = await urlsafeBase64(ciphertext);
  const params = {
    i: ivb64,
    c: ctb64,
  }
  const query = new URLSearchParams(params).toString();
  const link = 'https://chrishulbert.github.io/rally/play/?' + query;
  prompt('Here is the link to your rally! It is recommended that you copy this, go to tinyurl.com, paste it where it says "Paste long URL here", then click "Shorten Link", then share that link/QR with your friends at the start of your rally.', link);
}
// Takes Uint8Array or ArrayBuffer.
async function urlsafeBase64(data) {
  const blob = new Blob([data]);
  const base64 = await new Promise((resolve) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const base64 = reader.result.split(',')[1];
      const safe = base64.replaceAll('+', '-').replaceAll('/', '_').replaceAll('=', '');
      resolve(safe);
    };
    reader.readAsDataURL(blob);
  });
  return base64;
}
</script>
</html>
